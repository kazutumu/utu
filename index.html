<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>こころチェックイン</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="panel" id="start-screen">
        <div class="topbar">
          <span class="brand-mark" aria-hidden="true">＊</span>
          <span class="brand">こころチェックイン</span>
        </div>

        <div class="hero">
          <div class="hero-copy">
            <p class="eyebrow">過去2週間の気分をふりかえる</p>
            <h1>いまのこころの疲れ具合を、少しだけ見てみよう。</h1>
            <p>
              9つの質問に順番に答えると、抑うつ症状の目安を表示します。
              診断ではありませんが、相談や受診を考えるきっかけとして使えます。
            </p>
          </div>
          <div class="mascot-card" aria-hidden="true">
            <svg class="mascot" viewBox="0 0 240 220" role="img">
              <defs>
                <linearGradient id="leafGlow" x1="0" x2="1" y1="0" y2="1">
                  <stop stop-color="#82c7b6" />
                  <stop offset="1" stop-color="#f6c767" />
                </linearGradient>
              </defs>
              <ellipse cx="120" cy="188" rx="78" ry="16" fill="#d9e7e2" />
              <path d="M71 89c-20 11-34 32-34 56 0 35 31 55 81 55s85-20 85-55c0-24-14-46-36-57-9-21-24-34-47-34-24 0-40 13-49 35z" fill="#fff8eb" stroke="#37423f" stroke-width="6" stroke-linejoin="round" />
              <path d="M97 58c10-30 42-35 62-18-2 23-24 40-55 33z" fill="url(#leafGlow)" stroke="#37423f" stroke-width="6" stroke-linejoin="round" />
              <circle cx="91" cy="131" r="8" fill="#37423f" />
              <circle cx="150" cy="131" r="8" fill="#37423f" />
              <path d="M108 151c9 9 25 9 34 0" fill="none" stroke="#37423f" stroke-width="6" stroke-linecap="round" />
              <circle cx="71" cy="149" r="12" fill="#f3a6a2" opacity=".65" />
              <circle cx="169" cy="149" r="12" fill="#f3a6a2" opacity=".65" />
              <path d="M53 118c-19-1-31-9-34-24 16-6 31-1 43 13" fill="#f6c767" stroke="#37423f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M187 116c18-4 29-14 28-30-17-3-31 5-40 21" fill="#82c7b6" stroke="#37423f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M82 96c23 9 52 9 77 0" fill="none" stroke="#f2d9a6" stroke-width="7" stroke-linecap="round" />
            </svg>
          </div>
        </div>

        <div class="notice">
          <strong>大切なこと</strong>
          <span>このチェックは医療診断ではありません。つらさが強いとき、消えたい気持ちがあるときは、今すぐ身近な人や緊急窓口に連絡してください。</span>
        </div>

        <button class="primary" id="start-button">はじめる</button>
      </section>

      <section class="panel hidden" id="quiz-screen">
        <div class="progress-row">
          <button class="ghost" id="back-button" type="button" aria-label="前の質問へ">←</button>
          <div class="progress-wrap" aria-label="進捗">
            <div class="progress">
              <span id="progress-bar"></span>
            </div>
            <p id="progress-label">1 / 9</p>
          </div>
        </div>

        <div class="question-area">
          <div class="mini-mascot" aria-hidden="true">
            <span class="face">◜ᴗ◝</span>
          </div>
          <p class="prompt-kicker">この2週間で</p>
          <h2 id="question-text"></h2>
        </div>

        <div class="answers" id="answers"></div>
      </section>

      <section class="panel hidden" id="result-screen">
        <div class="result-header">
          <div class="result-illustration" aria-hidden="true">
            <svg viewBox="0 0 180 130">
              <path d="M31 86c4-28 25-48 56-48 33 0 56 21 61 50" fill="none" stroke="#37423f" stroke-width="7" stroke-linecap="round" />
              <circle cx="62" cy="74" r="8" fill="#37423f" />
              <circle cx="116" cy="74" r="8" fill="#37423f" />
              <path d="M76 94c11 8 26 8 37 0" fill="none" stroke="#37423f" stroke-width="6" stroke-linecap="round" />
              <path d="M20 106c35 11 103 12 140 0" fill="none" stroke="#82c7b6" stroke-width="12" stroke-linecap="round" />
              <path d="M64 33c7-20 28-24 42-12-1 17-17 28-38 24z" fill="#f6c767" stroke="#37423f" stroke-width="5" stroke-linejoin="round" />
            </svg>
          </div>
          <p class="eyebrow">チェック結果</p>
          <h2 id="result-title"></h2>
          <p id="result-copy"></p>
        </div>

        <div class="score-card">
          <span>スコア</span>
          <strong id="score-value"></strong>
          <small>0〜27点の目安</small>
        </div>

        <div class="care-box" id="care-box"></div>

        <div class="actions">
          <button class="primary" id="restart-button">もう一度チェック</button>
          <button class="secondary" id="copy-button">結果をコピー</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
